name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Quote Go versions so YAML doesn't parse them as floats (1.20 -> 1.2)
        go-version: ['1.20', '1.21', '1.22']
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ matrix.go-version }}
      - name: Install deps
        run: |
          go version
          # guard against Go installations that don't support 'go mod'
          if go help mod >/dev/null 2>&1; then
            go mod download
          else
            echo "go mod not supported by this Go installation; skipping download"
          fi
      - name: Run basic linters
        run: |
          echo "Running go vet"
          go vet ./...

          echo "Checking gofmt"
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "gofmt required for the following files:";
            echo "$unformatted";
            exit 1
          fi
      - name: Run tests
        run: go test ./... -v
      - name: Build binaries
        run: |
          GOOS=linux GOARCH=amd64 go build -o bin/calcbright-linux-amd64 ./cmd/calcbright
          GOOS=linux GOARCH=arm64 go build -o bin/calcbright-linux-arm64 ./cmd/calcbright
          GOOS=darwin GOARCH=amd64 go build -o bin/calcbright-darwin-amd64 ./cmd/calcbright
          GOOS=darwin GOARCH=arm64 go build -o bin/calcbright-darwin-arm64 ./cmd/calcbright
