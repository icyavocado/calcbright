name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: [1.20, 1.21, 1.22]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ matrix.go-version }}
      - name: Install deps
        run: go mod download
      - name: Run linters
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $GOPATH/bin v1.59.0
          $GOPATH/bin/golangci-lint run ./...
      - name: Run tests
        run: go test ./... -v
      - name: Build binaries
        run: |
          GOOS=linux GOARCH=amd64 go build -o bin/calcbright-linux-amd64 ./cmd/calcbright
          GOOS=linux GOARCH=arm64 go build -o bin/calcbright-linux-arm64 ./cmd/calcbright
          GOOS=darwin GOARCH=amd64 go build -o bin/calcbright-darwin-amd64 ./cmd/calcbright
          GOOS=darwin GOARCH=arm64 go build -o bin/calcbright-darwin-arm64 ./cmd/calcbright
