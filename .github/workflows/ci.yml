name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: [1.20, 1.21, 1.22]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ matrix.go-version }}
      - name: Install deps
        run: |
          go version
          # guard against Go installations that don't support 'go mod'
          if go help mod >/dev/null 2>&1; then
            go mod download
          else
            echo "go mod not supported by this Go installation; skipping download"
          fi
      - name: Run linters
        id: golangci
        uses: golangci/golangci-lint-action@v4
        with:
          version: v1.59.0
          args: --timeout 5m ./...
        continue-on-error: true
      - name: Linter diagnostics
        if: always()
        run: |
          echo "--- go version ---"
          go version || true
          echo "--- go env ---"
          go env || true
          echo "--- which go ---"
          which go || true
          echo "--- golangci-lint version ---"
          if [ -x "$GITHUB_WORKSPACE/golangci-lint" ]; then
            $GITHUB_WORKSPACE/golangci-lint version || true
          else
            echo "golangci-lint not found in workspace; action may have installed it elsewhere"
          fi
          echo "--- end diagnostics ---"
      - name: Run tests
        run: go test ./... -v
      - name: Build binaries
        run: |
          GOOS=linux GOARCH=amd64 go build -o bin/calcbright-linux-amd64 ./cmd/calcbright
          GOOS=linux GOARCH=arm64 go build -o bin/calcbright-linux-arm64 ./cmd/calcbright
          GOOS=darwin GOARCH=amd64 go build -o bin/calcbright-darwin-amd64 ./cmd/calcbright
          GOOS=darwin GOARCH=arm64 go build -o bin/calcbright-darwin-arm64 ./cmd/calcbright
